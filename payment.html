<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>扫码付款 - 农庄预约</title>
<link rel="stylesheet" href="css/style.css">
<style>
.payment-container { max-width: 480px; margin: 0 auto; padding: 16px; }
.payment-card {
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.payment-title {
  font-size: 18px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}
.booking-info {
  background: #f8f9fa;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 20px;
}
.info-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  font-size: 14px;
  border-bottom: 1px solid #eee;
}
.info-row:last-child { border-bottom: none; }
.info-label { color: #666; }
.info-value { color: #333; font-weight: 500; }
.amount-section {
  text-align: center;
  padding: 20px 0;
}
.amount-label {
  font-size: 14px;
  color: #666;
  margin-bottom: 8px;
}
.amount-value {
  font-size: 36px;
  font-weight: 700;
  color: #ff6b6b;
}
.qr-section {
  text-align: center;
  padding: 20px 0;
}
.qr-code {
  width: 240px;
  height: 240px;
  object-fit: contain;
  border-radius: 12px;
  border: 2px solid #eee;
}
.qr-tip {
  font-size: 14px;
  color: #666;
  margin-top: 12px;
}
.status-badge {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
}
.status-unpaid {
  background: #fff2f0;
  color: #ff4d4f;
}
.status-paid {
  background: #f6ffed;
  color: #52c41a;
}
.action-btns {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}
.action-btns button {
  flex: 1;
}
</style>
</head>
<body>

<!-- 导航栏 -->
<nav class="navbar">
  <button class="nav-btn" onclick="location.href='index.html'" style="background:transparent;font-size:20px;padding:4px 8px;color:#fff;border:none;cursor:pointer;">‹ 首页</button>
  <div class="nav-title">扫码付款</div>
  <div class="nav-right"></div>
</nav>

<div class="payment-container" style="margin-top:56px;">

  <!-- 付款状态 -->
  <div class="payment-card">
    <div class="payment-title">
      <span id="statusBadge" class="status-badge status-unpaid">待付款</span>
    </div>

    <!-- 预约信息 -->
    <div class="booking-info" id="bookingInfo">
      <div class="info-row">
        <span class="info-label">预约编号</span>
        <span class="info-value" id="bkId">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">预约日期</span>
        <span class="info-value" id="bkDate">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">服务项目</span>
        <span class="info-value" id="bkServices">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">人数</span>
        <span class="info-value" id="bkPeople">-</span>
      </div>
      <div class="info-row" id="discountRow" style="display:none;">
        <span class="info-label">优惠</span>
        <span class="info-value" style="color:#52c41a;" id="bkDiscount">-</span>
      </div>
    </div>

    <!-- 金额 -->
    <div class="amount-section">
      <div class="amount-label">应付金额</div>
      <div class="amount-value" id="bkAmount">¥0</div>
    </div>

    <!-- 二维码 -->
    <div class="qr-section">
      <img class="qr-code" id="paymentQr" src="images/payment_qr.png?v=2" alt="付款二维码" onerror="this.style.display='none';document.getElementById('qrPlaceholder').style.display='block';">
      <div id="qrPlaceholder" style="display:none;width:240px;height:240px;margin:0 auto;background:#f5f5f5;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#999;font-size:14px;border:2px dashed #ddd;">
        付款码未配置
      </div>
      <div class="qr-tip">请使用微信或支付宝扫码付款</div>
    </div>

    <!-- 操作按钮 -->
    <div class="action-btns">
      <button class="btn-secondary" onclick="location.href='index.html'">返回首页</button>
      <button class="btn-primary" onclick="checkPayment()">我已付款</button>
    </div>
  </div>

</div>

<script src="js/data.js"></script>
<script>
function init() {
  var params = new URLSearchParams(location.search);
  var bookingId = params.get('id');

  if (!bookingId) {
    document.querySelector('.payment-container').innerHTML =
      '<div class="payment-card" style="text-align:center;padding:40px;">' +
      '<div style="font-size:16px;color:#999;">无效的预约信息</div>' +
      '<button class="btn-primary" style="margin-top:20px;" onclick="location.href=\'index.html\'">返回首页</button>' +
      '</div>';
    return;
  }

  var bookings = getBookings();
  var booking = bookings.find(function(b) { return b.id === bookingId; });

  if (!booking) {
    document.querySelector('.payment-container').innerHTML =
      '<div class="payment-card" style="text-align:center;padding:40px;">' +
      '<div style="font-size:16px;color:#999;">未找到预约记录</div>' +
      '<button class="btn-primary" style="margin-top:20px;" onclick="location.href=\'index.html\'">返回首页</button>' +
      '</div>';
    return;
  }

  // 填充信息
  document.getElementById('bkId').textContent = booking.id;
  document.getElementById('bkDate').textContent = booking.date;
  document.getElementById('bkServices').textContent = (booking.serviceNames || []).join(' + ');
  document.getElementById('bkPeople').textContent = (booking.peopleCount || 0) + '人';

  if (booking.discountAmount > 0) {
    document.getElementById('discountRow').style.display = 'flex';
    document.getElementById('bkDiscount').textContent = booking.discountLabel + ' -¥' + booking.discountAmount;
  }

  document.getElementById('bkAmount').textContent = '¥' + booking.totalPrice;

  // 更新状态显示
  if (booking.paid || booking.status === '已付款') {
    document.getElementById('statusBadge').textContent = '已付款';
    document.getElementById('statusBadge').className = 'status-badge status-paid';
    document.querySelector('.qr-tip').textContent = '付款已完成，谢谢！';
    document.getElementById('paymentQr').style.opacity = '0.3';
  }
}

function checkPayment() {
  var params = new URLSearchParams(location.search);
  var bookingId = params.get('id');
  if (!bookingId) return;

  var bookings = getBookings();
  var booking = bookings.find(function(b) { return b.id === bookingId; });
  if (!booking) return;

  // 标记为已付款（实际应由后台确认，这里先本地标记）
  booking.status = '已付款';
  booking.paid = true;
  saveBookings(bookings);

  alert('已标记为付款完成！');
  location.reload();
}

// 从云端拉取最新数据后初始化
loadFromCloud(function() {
  init();
});
</script>

</body>
</html>
